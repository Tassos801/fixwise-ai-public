name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/fixwise-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/fixwise-dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test iOS app
        run: |
          xcodebuild \
            -project ios/FixWise/FixWise.xcodeproj \
            -scheme FixWise \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - ios
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f backend/Dockerfile backend
      - run: docker build -f web/fixwise-dashboard/Dockerfile web/fixwise-dashboard
