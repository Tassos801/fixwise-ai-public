name: FixWise
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  FixWise:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FixWise
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3UY47WQ6MM
        PRODUCT_BUNDLE_IDENTIFIER: com.tassosdimitriou.fixwisebeta
        PRODUCT_NAME: FixWise
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FixWise
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
        INFOPLIST_KEY_NSCameraUsageDescription: FixWise uses the camera to inspect a task and place guidance overlays.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: FixWise uses the microphone for tap-to-talk guidance requests.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: FixWise transcribes your spoken question into AI prompts.
        INFOPLIST_KEY_FIXWISE_BACKEND_HTTP_URL: https://fixwise-backend.onrender.com
        INFOPLIST_KEY_FIXWISE_BACKEND_WS_URL: wss://fixwise-backend.onrender.com/ws/session
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
    dependencies:
      - sdk: ARKit.framework
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
  FixWiseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FixWiseTests
    dependencies:
      - target: FixWise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fixwise.ai.tests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
schemes:
  FixWise:
    build:
      targets:
        FixWise: all
        FixWiseTests: [test]
    test:
      targets:
        - name: FixWiseTests
