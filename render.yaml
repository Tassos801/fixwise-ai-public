services:
  - type: web
    name: fixwise-backend
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: cd backend && pip install .
    startCommand: cd backend && uvicorn fixwise_backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FIXWISE_AI_MODE
        value: live
      - key: FIXWISE_AI_PROVIDER
        value: gemma
      - key: FIXWISE_ENVIRONMENT
        value: production
      - key: FIXWISE_DATABASE_PATH
        value: /opt/render/project/src/backend/fixwise.db
      - key: GEMMA_MODEL
        value: gemma-4-31b-it
      - key: FIXWISE_TTS_ENABLED
        value: true
      - key: GEMINI_TTS_MODEL
        value: gemini-3.1-flash-tts-preview
      - key: GEMINI_TTS_FALLBACK_MODEL
        value: gemini-2.5-flash-preview-tts
      - key: GEMINI_TTS_VOICE
        value: Kore
      - key: FIXWISE_ALLOWED_ORIGINS
        sync: false
      - key: FIXWISE_JWT_SECRET
        sync: false
      - key: FIXWISE_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMMA_API_KEY
        sync: false

  - type: web
    name: fixwise-dashboard
    runtime: static
    buildCommand: cd web/fixwise-dashboard && npm ci && npm run build
    staticPublishPath: ./web/fixwise-dashboard/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
